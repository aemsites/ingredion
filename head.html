<meta
  http-equiv="Content-Security-Policy"
  content="script-src 'nonce-aem' 'strict-dynamic' 'unsafe-eval' https://www.myingredion.com https://assets.adobedtm.com; base-uri 'self'; object-src 'none';"
  move-as-header="true"
>

<meta name="viewport" content="width=device-width, initial-scale=1"/>

<script nonce="aem">
  (function () {
    var GATED_PATH = '/na/en-us/legal/offer-communications';
    var TERMS_PATH = '/drafts/shajahan/disclaimer-content';

    var currentPath = window.location.pathname.replace(/\/+$/, '');

    if (currentPath === GATED_PATH) {
      var params = new URLSearchParams(window.location.search);
      if (params.get('consent') === 'agreed') {
        params.delete('consent');
        var cleanUrl = window.location.pathname
          + (params.toString() ? '?' + params.toString() : '')
          + window.location.hash;
        window.history.replaceState({}, '', cleanUrl);
      } else {
        window.location.replace(TERMS_PATH);
      }
    }
  })();
</script>
